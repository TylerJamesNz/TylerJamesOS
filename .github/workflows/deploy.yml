name: Deploy

# Unified deploy: schema migrations → edge functions → frontend.
# Migrations + functions run before the frontend build, so a failure in either
# halts the deploy and prevents the UI from going live against a stale backend.

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"

      - name: Push database migrations
        run: supabase db push

      - name: Deploy edge functions
        if: hashFiles('supabase/functions/**/index.ts') != ''
        run: |
          for fn_dir in supabase/functions/*/; do
            fn_name=$(basename "$fn_dir")
            echo "Deploying function: $fn_name"
            supabase functions deploy "$fn_name" --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"
          done

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Vercel pull (production)
        working-directory: app
        run: vercel pull --yes --environment=production --token=$VERCEL_TOKEN

      - name: Vercel build (production)
        working-directory: app
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: vercel build --prod --token=$VERCEL_TOKEN

      - name: Vercel deploy (production)
        working-directory: app
        run: vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN
